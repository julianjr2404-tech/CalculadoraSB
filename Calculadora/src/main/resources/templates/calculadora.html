<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <title>Calculadora</title>

    <link rel="stylesheet" th:href="@{/style.css}">

</head>

<body>

    <div class="contenedor">

        <h1>Calculadora Spring Boot</h1>

        <form th:action="@{/calculadora}" method="post" th:object="${calculadoraForm}">

            <input type="number" step="any" th:field="*{numeroA}" placeholder="Número A">

            <input type="number" step="any" th:field="*{numeroB}" placeholder="Número B">

            <select th:field="*{operacion}">
                <option value="sumar">Sumar</option>
                <option value="restar">Restar</option>
                <option value="multiplicar">Multiplicar</option>
                <option value="dividir">Dividir</option>
            </select>

            <button type="submit">Calcular</button>

        </form>

        <div th:if="${resultado != null}">
            <h2>Resultado: <span th:text="${resultado}"></span></h2>
        </div>

    </div>

</body>

</html>
